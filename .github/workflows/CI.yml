name: CI
on:
  merge_group:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "*"

concurrency:
  # Skip intermediate builds: all builds except for builds on the `master` branch
  # Cancel intermediate builds: only pull request builds
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.ref != 'refs/heads/main' || github.run_number }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

permissions:
  contents: read

jobs:
  finalize:
    timeout-minutes: 10
    needs: [format, test, dendro]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo format: ${{ needs.format.result }}
          echo test: ${{ needs.test.result }}
          echo dendro: ${{ needs.dendro.result }}
      - run: exit 1
        if: |
          (needs.format.result != 'success') ||
          (needs.test.result != 'success') ||
          (needs.dendro.result != 'success')

  format:
    timeout-minutes: 20
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: julia-actions/install-juliaup@05d98a2ef433ca0723a8221e38c4723ea92b0c5f # v3.1.4
        with:
          channel: '1'

      - uses: extractions/setup-just@e33e0265a09d6d736e2ee1e0eb685ef1de4669ff # v3.0.0

      - name: Install runic
        run: |
          julia --project=@runic --startup-file=no -e 'using Pkg; Pkg.add("Runic")'
          cat > runic <<'SCRIPT'
          #!/bin/sh
          export JULIA_LOAD_PATH="@runic"
          exec julia --startup-file=no -e 'using Runic; exit(Runic.main(ARGS))' -- "$@"
          SCRIPT
          chmod +x runic
          echo "$PWD" >> "$GITHUB_PATH"
      - run: just fmt-check

  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    continue-on-error: ${{ matrix.channel == 'nightly' }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macOS-latest
        channel:
          - "1.10"
          - "1"
          - "nightly"

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: julia-actions/install-juliaup@05d98a2ef433ca0723a8221e38c4723ea92b0c5f # v3.1.4
        with:
          channel: ${{ matrix.channel }}

      - uses: julia-actions/cache@2b1bf4d8a138668ac719ea7ca149b53ed8d8401e # v2.0.7

      - uses: julia-actions/julia-buildpkg@e3eb439fad4f9aba7da2667e7510e4a46ebc46e1 # v1.7.0

      - uses: julia-actions/julia-runtest@d60b785c6f2bdf4ebfb18b2b6f7d93b7dfb0efe3 # v1.11.4

      - uses: julia-actions/julia-processcoverage@03114f09f119417c3242a9fb6e0b722676aedf38 # v1.2.2

      - uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
        with:
          verbose: true
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}

  dendro:
    timeout-minutes: 30
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: julia-actions/install-juliaup@05d98a2ef433ca0723a8221e38c4723ea92b0c5f # v3.1.4
        with:
          channel: '1.12'

      - uses: julia-actions/cache@2b1bf4d8a138668ac719ea7ca149b53ed8d8401e # v2.0.7

      - name: Instantiate analysis environment
        run: julia --project=test/dendro -e 'using Pkg; Pkg.instantiate()'

      - name: Run Dendro over REPLicant source
        run: julia --project=test/dendro test/dendro/dendro.jl
